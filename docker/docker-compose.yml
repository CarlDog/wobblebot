# WobbleBot Docker Compose — NAS / Synology deployment.
#
# Brings up 8 long-running daemons (live, observe, news, advise,
# harvest, operator, web, maintenance) using a single image.
# Each service overrides `command:` to pick its entry point and
# inherits the rest via YAML anchor.
#
# Designed for Portainer-managed deployment: secrets and tunables
# come from Portainer stack-level env (per the global
# `~/.claude/rules/docker-deployments.md` three-config-stores rule).
# `${VAR}` references below are substituted at deploy time from
# Portainer's stored env, not from any .env file in the repo.
#
# cli/shadow (paper trading) is intentionally omitted from the
# default set — operators add it back as a separate service if
# they want continued shadow runs on the NAS.
#
# One-shot CLIs (preflight, apply, recalibrate, status, sandbox)
# are invoked via `docker compose run --rm tools python -m
# wobblebot.cli.<entry>` against the `tools` service (Compose
# profile = tools, so it doesn't start with `docker compose up`).

x-wobblebot-defaults: &wobblebot-defaults
  # Pulled from GitHub Container Registry — the `Publish Docker
  # image to GHCR` workflow rebuilds + pushes on every main commit
  # touching the runtime surface (src/, config/, tools/,
  # docker/Dockerfile, pyproject.toml).
  #
  # IMAGE_TAG is operator-controlled via Portainer stack env. Pin to
  # an immutable `:sha-<short>` (e.g. sha-de318e2) so Portainer's
  # redeploy forces a real pull — `:latest` / `:main` are mutable
  # tags and Docker's pull-image flag is unreliable against them
  # (it skips pull when a local cache exists, even when explicitly
  # asked to pull). Bumping IMAGE_TAG to a new SHA is the canonical
  # "deploy a new build" action: change the env in Portainer →
  # save → stack auto-redeploys → guaranteed fresh pull.
  image: ghcr.io/carldog/wobblebot:${IMAGE_TAG:-main}
  environment:
    # ---- Kraken keys (per ADR-003 key separation) --------------
    # Read-only: cli/status, cli/observe, cli/shadow, cli/web,
    #            cli/operator (BalanceEx for the StatusQuery path)
    KRAKEN_READER_API_KEY: ${KRAKEN_READER_API_KEY}
    KRAKEN_READER_API_SECRET: ${KRAKEN_READER_API_SECRET}
    # Trade: cli/preflight, cli/live
    KRAKEN_TRADER_API_KEY: ${KRAKEN_TRADER_API_KEY}
    KRAKEN_TRADER_API_SECRET: ${KRAKEN_TRADER_API_SECRET}
    # Harvester (Withdraw scope ON; trade key Withdraw OFF): cli/harvest
    KRAKEN_HARVESTER_API_KEY: ${KRAKEN_HARVESTER_API_KEY}
    KRAKEN_HARVESTER_API_SECRET: ${KRAKEN_HARVESTER_API_SECRET}
    # ---- Cloud LLM keys (optional; cpu-only profile uses Ollama) -
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    # ---- News ingestion (CryptoCompare) ------------------------
    CRYPTOCOMPARE_API_KEY: ${CRYPTOCOMPARE_API_KEY:-}
    # ---- Discord (cli/operator) --------------------------------
    DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
    # ---- Web UI session cookie signing key (cli/web) -----------
    WOBBLEBOT_WEB_SESSION_SECRET: ${WOBBLEBOT_WEB_SESSION_SECRET}
    # ---- NAS-specific Ollama routing (static, not a secret) ----
    # cli/advise reads OLLAMA_BASE_URL from env. The host-gateway
    # entry in extra_hosts below makes host.docker.internal:11434
    # resolve to the NAS's host-networked Ollama container.
    OLLAMA_BASE_URL: http://host.docker.internal:11434
  volumes:
    # Host paths default to the NAS layout under /volume1/docker/wobblebot.
    # Override via HOST_DATA_DIR / HOST_CONFIG_DIR for local development
    # (e.g. HOST_DATA_DIR=../data when running docker-compose from
    # inside the repo clone).
    #
    # NB: every daemon's log_file_path defaults to data/logs/X.log
    # (relative to /app), so log files land under /app/data/logs/
    # inside the data mount — there's no separate /app/logs mount.
    - ${HOST_DATA_DIR:-/volume1/docker/wobblebot/data}:/app/data
    - ${HOST_CONFIG_DIR:-/volume1/docker/wobblebot/config}:/app/config
  extra_hosts:
    # Containers reach host-resident Ollama via
    # `http://host.docker.internal:11434`. Per the global
    # docker-deployments.md rule, baked into compose so it's
    # harmless when unused and load-bearing when needed.
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:

  # ------------------------------------------------------------------
  # Real-money trading. NO auto-restart — a loss-cap trip (exit 1)
  # means stop, by design. Operator decides whether to resume.
  # ------------------------------------------------------------------
  live:
    <<: *wobblebot-defaults
    container_name: wobblebot-live
    command: python -m wobblebot.cli.live --profile cpu-only
    restart: "no"

  # ------------------------------------------------------------------
  # Read-only price + balance collection. Safe to auto-restart.
  # ------------------------------------------------------------------
  observe:
    <<: *wobblebot-defaults
    container_name: wobblebot-observe
    command: python -m wobblebot.cli.observe --profile cpu-only

  # ------------------------------------------------------------------
  # News ingestion (CryptoCompare + RSS). Safe to auto-restart.
  # ------------------------------------------------------------------
  news:
    <<: *wobblebot-defaults
    container_name: wobblebot-news
    command: python -m wobblebot.cli.news --profile cpu-only

  # ------------------------------------------------------------------
  # Advisor (LLM-driven). Advisory only per ADR-002; no money risk.
  # ------------------------------------------------------------------
  advise:
    <<: *wobblebot-defaults
    container_name: wobblebot-advise
    command: python -m wobblebot.cli.advise --profile cpu-only

  # ------------------------------------------------------------------
  # Treasury monitor. Touches money (cli/harvest --execute path),
  # so NO auto-restart — failures need operator attention.
  # ------------------------------------------------------------------
  harvest:
    <<: *wobblebot-defaults
    container_name: wobblebot-harvest
    command: python -m wobblebot.cli.harvest --profile cpu-only
    restart: "no"

  # ------------------------------------------------------------------
  # Discord operator interface. No money risk (ADR-002 firewall:
  # commands route through pending_commands → cli/live's approved
  # poll). Safe to auto-restart.
  # ------------------------------------------------------------------
  operator:
    <<: *wobblebot-defaults
    container_name: wobblebot-operator
    command: python -m wobblebot.cli.operator --profile cpu-only

  # ------------------------------------------------------------------
  # FastAPI dashboard. Binds inside the container; DSM reverse
  # proxy fronts the LAN with the wobblebot.carldog-nas hostname.
  # Port published only to the loopback so the NAS doesn't expose
  # the dashboard directly to the LAN — the proxy is the only
  # external entry point. Per ADR-016.
  # ------------------------------------------------------------------
  web:
    <<: *wobblebot-defaults
    container_name: wobblebot-web
    command: python -m wobblebot.cli.web serve --bind-host 0.0.0.0 --bind-port 8000 --profile cpu-only
    ports:
      # Host port 8000 is already in use on the NAS (likely DSM Web
      # Station / FreshRSS stack). Bind 28080 on the host instead;
      # DSM reverse proxy for wobblebot.carldog-nas must target
      # http://localhost:28080 (NOT :8000) to match.
      - "127.0.0.1:28080:8000"

  # ------------------------------------------------------------------
  # Background maintenance (VACUUM + prune + backup). No money
  # risk; safe to auto-restart.
  # ------------------------------------------------------------------
  maintenance:
    <<: *wobblebot-defaults
    container_name: wobblebot-maintenance
    command: python -m wobblebot.cli.maintenance --profile cpu-only

  # ------------------------------------------------------------------
  # One-shot CLI dispatcher. No default command; no auto-restart.
  # Operator invokes via:
  #   docker compose run --rm tools python -m wobblebot.cli.preflight
  #   docker compose run --rm tools python -m wobblebot.cli.recalibrate --target-balance 100
  #   docker compose run --rm tools python -m wobblebot.cli.apply --commit
  #   docker compose run --rm tools python -m wobblebot.cli.status
  # ------------------------------------------------------------------
  tools:
    <<: *wobblebot-defaults
    container_name: wobblebot-tools
    command: ["python", "-c", "import sys; sys.stderr.write('use: docker compose run --rm tools <command>\\n'); sys.exit(2)"]
    restart: "no"
    profiles:
      - tools
