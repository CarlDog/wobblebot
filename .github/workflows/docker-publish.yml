name: Publish Docker image to GHCR

# Triggers:
#   - Every push to main that touches anything that lands in the image.
#   - Manual workflow_dispatch from the Actions tab (useful for forcing
#     a fresh build after a Dockerfile-base-image security update).
#
# Image lands at ghcr.io/carldog/wobblebot with the following tags:
#   :main           — every successful main build (mutable)
#   :latest         — alias for :main (mutable)
#   :sha-<short>    — pinned, never overwritten (use for soak / pinning)
#
# Visibility: package is private by default. Operator flips to public
# via GitHub UI → Profile → Packages → wobblebot → Package settings →
# Change visibility → Public, so Portainer can pull anonymously without
# any auth config. See docker/README.md for the rationale.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'config/**'
      - 'tools/**'
      - 'docker/Dockerfile'
      - 'pyproject.toml'
      - '.dockerignore'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=wobblebot
            org.opencontainers.image.description=Deterministic, safety-first micro-trading system using hexagonal architecture
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
