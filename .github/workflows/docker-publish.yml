name: CI & Publish to GHCR

# Two jobs, gated:
#   test           — black/isort --check + pylint + mypy + pytest (unit;
#                    schema-drift + filterwarnings=error included). Runs on
#                    every push to main, every pull request (incl. Dependabot
#                    bumps), and manual dispatch.
#   build-and-push — needs: test, so a red test job BLOCKS the publish.
#                    Publishes to GHCR only on push-to-main / workflow_dispatch,
#                    never on PRs. Closes the "image published from unvalidated
#                    main commit" gap — local pre-commit hooks are bypassable
#                    and don't gate the publish; this does.
#
# Image lands at ghcr.io/carldog/wobblebot with the following tags:
#   :main           — every successful main build (mutable)
#   :latest         — alias for :main (mutable)
#   :sha-<short>    — pinned, never overwritten (use for soak / pinning)
#
# Visibility: package is public so Portainer can pull anonymously without
# any auth config. See docker/README.md for the rationale.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'tools/**'
      - 'docker/Dockerfile'
      - 'pyproject.toml'
      - '.dockerignore'
      - '.github/workflows/docker-publish.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Opt into Node.js 24 ahead of GitHub's forced transition on
  # 2026-06-02. The actions/checkout@v4 + docker/* actions used
  # below already ship Node.js 24-compatible code paths; this
  # exercises them now so any incompatibility surfaces here
  # rather than as a surprise CI failure on the deadline.
  # Remove this line after 2026-06-02 (it becomes the default).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"

      - name: Format check (black)
        run: black --check src/ tests/

      - name: Import order (isort)
        run: isort --check-only src/ tests/

      - name: Lint (pylint)
        run: pylint src/

      - name: Type check (mypy)
        run: mypy src/

      - name: Tests (pytest — unit; integration excluded by addopts)
        run: pytest

  build-and-push:
    needs: test
    # Publish only on a real main build / manual dispatch — never on a PR.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=wobblebot
            org.opencontainers.image.description=Deterministic, safety-first micro-trading system using hexagonal architecture
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
