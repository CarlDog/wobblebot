# WobbleBot Configuration (Example)
#
# Copy this file to settings.yml and adjust for your needs. The
# committed example file documents every operator-tunable value;
# settings.yml stays gitignored and holds your actual values.
#
# Per the project's standing rule, settings.example.yml and
# settings.yml stay schema-aligned: same keys, same comments, same
# section ordering, same structure — only VALUES differ. Schema-drift
# tests (tests/config/test_schema_drift.py) catch most drift, but
# comment parity is on you.
#
# CLIs accept --config path/to/settings.yml (default: this directory's
# settings.yml) and --profile NAME to apply a named override block.
# Any CLI flag passed explicitly takes precedence over both YAML and
# profile values.

# ============================================================================
# Application metadata
# ============================================================================
application:
  name: "WobbleBot"
  version: "0.1.0"
  # mode: sandbox | dev | live-low-risk | production
  # Currently informational only; Phase 5 may use it to gate features.
  mode: "sandbox"

# ============================================================================
# Exchange connection (Kraken)
# ============================================================================
# API credentials NEVER live here — they're in .env as KRAKEN_API_KEY
# (read-only) and KRAKEN_TRADE_API_KEY (Trade scope, no Withdraw).
# This block holds connection-level tunables only.
exchange:
  name: "kraken"
  rate_limit_rps: 1.0       # request budget per second; Kraken's tier limit is generous for hobby use
  request_timeout_seconds: 10
  max_retries: 3
  retry_delay_seconds: 2.0

# ============================================================================
# Grid trading geometry (engine-tunable)
# ============================================================================
# These are the parameters the GridEngine reads. Per-coin overrides
# under `coins:` shadow `default:` for that coin only.
grid:
  default:
    spacing_percentage: 1.0   # delta between adjacent levels, % of reference price
    levels_above: 3           # SELL levels above the anchor
    levels_below: 3           # BUY levels below the anchor
    order_size_usd: 10.0      # USD budget per order; per-pair quantization happens at submit

  coins:
    DOGE:
      spacing_percentage: 2.0
      levels_above: 3
      levels_below: 3
      order_size_usd: 15.0
      enabled: true
    ADA:
      spacing_percentage: 1.5
      levels_above: 4
      levels_below: 4
      order_size_usd: 12.0
      enabled: false
    SOL:
      spacing_percentage: 1.0
      levels_above: 5
      levels_below: 5
      order_size_usd: 10.0
      enabled: false
    MATIC:
      spacing_percentage: 1.5
      levels_above: 4
      levels_below: 4
      order_size_usd: 10.0
      enabled: false
    ETH:
      spacing_percentage: 0.5
      levels_above: 6
      levels_below: 6
      order_size_usd: 20.0
      enabled: false

# ============================================================================
# Safety caps (engine-enforced, non-negotiable)
# ============================================================================
# These are checked inside GridEngine BEFORE any place_order call.
# Refusals are logged + counted in StepResult.refusals; they never raise.
safety:
  max_total_exposure_usd: 100.0       # global cap across all coins
  max_daily_spend_usd: 100.0          # BUY-side commits per UTC day
  max_per_coin_exposure_usd: 100.0    # per-coin cap
  max_orders_per_coin: 20             # count cap, per-coin

  emergency_stop:
    enabled: true
    max_loss_percentage: 20.0         # informational; not yet wired
    min_exchange_balance_usd: 0       # informational; not yet wired

# ============================================================================
# Scheduled task cadences (Stage 3.3 Slice C.0)
# ============================================================================
# Every long-running daemon reads its polling interval from here.
# Duration format: a number with a unit suffix.
#   30s   = 30 seconds
#   10m   = 10 minutes
#   4h    = 4 hours
#   7d    = 7 days
# A bare number is treated as seconds (e.g. `30` == `30s`). Use `0s`
# to disable a schedule whose consumer supports it (only observe's
# balance polling does today).
#
# Adding a new periodic task: add a key here and have the consuming
# CLI look it up via config.schedules.get("<name>").
schedules:
  observe_prices: 30s                 # cli/observe: public Ticker poll cadence
  observe_balances: 10m               # cli/observe: private BalanceEx; 0s disables
  news: 30m                           # cli/news: poll every enabled source
  advise: 4h                          # cli/advise (Stage 3.3): advisor invocation cadence
  harvest: 1h                         # cli/harvest (Stage 4.2): balance-monitor cadence

# ============================================================================
# Per-CLI: live (cli/live)
# ============================================================================
# Knobs specific to the operational loop against real Kraken.
# Real money trading. CLI flags override these values.
live:
  symbols:
    - BTC/USD
  db: "data/wobblebot-live.db"
  tick_seconds: 5.0
  max_runtime_minutes: 60.0           # session-level kill switch; ~null~ = run indefinitely
  max_session_loss_usd: 5.0           # USD-balance delta abort threshold
  log_format: plain                   # plain | json

# ============================================================================
# Per-CLI: shadow (cli/shadow)
# ============================================================================
# Same engine, real Kraken prices, simulated execution against a
# synthetic ledger. No real money.
shadow:
  symbols:
    - BTC/USD
  db: "data/wobblebot-shadow.db"
  tick_seconds: 5.0
  max_runtime_minutes: 60.0           # session-level kill switch; ~null~ = run indefinitely
  max_session_loss_usd: 100.0         # synthetic — be generous
  log_format: plain

  # Synthetic balances at session start. Operator-supplied; never
  # inferred from real Kraken (per ADR-008's muscle-memory guard).
  initial_balances:
    USD: 10000
    BTC: 0
    ETH: 0

  # Per-fill fee model. Default rates match Kraken's published
  # base-tier (0.26% maker / 0.40% taker), confirmed by the live
  # measurement in Phase 2's first-trade receipt.
  maker_fee_rate: 0.0026
  taker_fee_rate: 0.0040

# ============================================================================
# Per-CLI: observe (cli/observe)
# ============================================================================
# Pure data collection; no engine, no LLM, no orders. Polling cadences
# live in the `schedules:` block at the bottom of this file.
observe:
  symbols:
    - BTC/USD
  db: "data/wobblebot-observe.db"
  log_format: plain

# ============================================================================
# Per-CLI: preflight (cli/preflight)
# ============================================================================
# Diagnostic single-step against live Kraken with adapter in
# validate=true mode. Reads grid + safety from the sections above.
preflight:
  symbol: BTC/USD                     # singular — preflight runs ONE step
  log_format: plain

# ============================================================================
# Per-CLI: status (cli/status)
# ============================================================================
# Read-only one-shot Kraken fetch: current price + account balances.
# No engine, no orders. Uses KRAKEN_API_KEY (read-only key).
status:
  symbol: BTC/USD
  log_format: plain

# ============================================================================
# Per-CLI: sandbox (cli/sandbox)
# ============================================================================
# Phase 1 sandbox: hard-coded buy-dip/sell-rebound cycle through
# MockExchangeAdapter + SQLiteStorageAdapter. No real Kraken contact.
# Useful for verifying the hex layers wire up after a fresh checkout.
sandbox:
  db: "data/wobblebot-sim.db"
  log_format: plain

# ============================================================================
# News ingestion (Stage 3.2.5 — see ADR-007)
# ============================================================================
# Long-running daemon (`python -m wobblebot.cli.news`) that polls every
# enabled source and persists items to news_items. Storage dedup is
# UNIQUE(source, external_id), so re-fetching across polls is a no-op.
#
# Two source types ship in v1:
#   - RSS feeds (no auth, any feed URL works)
#   - CryptoCompare News (free tier; requires CRYPTOCOMPARE_API_KEY)
#
# The original ADR-007 plan named CryptoPanic + Whale-alert; both went
# paid-only after the ADR was written, so v1 pivots to RSS +
# CryptoCompare. NewsPort stays abstract — operators can plug in paid
# sources later if they want.
#
# Per-source dedup means leaving overlapping feeds enabled is safe;
# the storage layer keeps one row per (source, external_id) pair.
# Disabling a noisy outlet is a single `enabled: false` flip.
news:
  db: "data/wobblebot-news.db"

  rss_feeds:
    - source_id: rss:coindesk
      url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
      enabled: true
    - source_id: rss:decrypt
      url: "https://decrypt.co/feed"
      enabled: true
    - source_id: rss:theblock
      url: "https://www.theblock.co/rss.xml"
      enabled: true
    - source_id: rss:cointelegraph
      url: "https://cointelegraph.com/rss"
      enabled: false                  # noisier; flip on if you want broader coverage

  # CryptoCompare News (aggregator; free tier requires API key).
  # Substantially overlaps with RSS coverage. Keep enabled for 90 days
  # then evaluate whether the additional source diversity earns its
  # place vs. simply running more RSS feeds.
  cryptocompare:
    enabled: true
    lang: EN
    # categories: "BTC|ETH"            # optional pipe-separated filter

  log_format: plain

# ============================================================================
# Per-CLI: advise (cli/advise — Stage 3.3 Passive Advisory Workflow)
# ============================================================================
# Long-running daemon that periodically builds a PerformanceSummary,
# asks the configured advisor for a recommendation, and persists the
# result to its own DB. Per ADR-002 + ADR-007 nothing here applies —
# operator reviews via `tools/show_suggestions.py`.
#
# Cadence lives in `schedules.advise` above. Multi-symbol since
# Stage 3.6b: the daemon iterates serial per symbol within each sweep,
# building a single-symbol PerformanceSummary per cycle so the LLM
# never sees more than one coin's context at a time (no cross-
# contamination of opinions).
advise:
  symbols:
    - BTC/USD
    # - ETH/USD       # uncomment to add coverage; cycles run serial
    # - DOGE/USD
  db: "data/wobblebot-advise.db"
  observe_db: "data/wobblebot-observe.db"   # where to read price history
  news_db: "data/wobblebot-news.db"         # where to read news context
  metrics_lookback_hours: 6                 # window for vol/drawdown/flatness/cycles
  news_lookback_hours: 24                   # 0 disables news in the prompt
  news_match_coin: false                    # true = only news mentioning the symbol's base
  news_limit: 20                            # cap items per cycle (prompt-token budget)
  log_format: plain

# ============================================================================
# Strategy Advisor (Phase 3 — see ADR-007 + ADR-009)
# ============================================================================
# Two modes:
#   type: single  - one LLM, no aggregation. Simple; fast to iterate.
#                   This is the Stage 3.2 default; MoE ships in 3.4a.
#   type: moe     - mixture of experts (≥3 LLMs) + aggregator. The
#                   `profiles.moe-advisor` block below shows the full
#                   MoE shape; activate it with `--profile moe-advisor`
#                   once the MoE adapter lands.
#
# Aggregation strategies (MoE only):
#   voting              - discrete-direction votes; majority wins
#   weighted_confidence - numeric proposals × self-reported confidence
#   arbitrator          - a fourth model reads expert opinions, picks
#
# Cloud LLMs (Anthropic/OpenAI/Google) and local Ollama models can mix
# freely. Per ADR-007 the upside of genuinely different training priors
# outweighs per-call data exposure for a hobby trading bot.
advisor:
  type: single                        # Stage 3.2 default. Flip to `moe` via profile.

  # Cadence lives in the `schedules:` block at the bottom of this file
  # (key: `advise`), alongside every other periodic-task interval.

  # Single-mode LLM target. Required when type=single.
  provider: ollama                    # ollama | anthropic | openai | google
  model: deepseek-r1:7b
  prompt_file: "config/prompts/quant.md"
  inference_params:
    temperature: 0.5
    max_tokens: 512                   # bump to 2048 for thinking models (R1, o1) —
                                      # they need room for <think> + the JSON answer
    timeout_seconds: 60               # bump to 180+ for 70B-class models or any
                                      # thinking model whose chain-of-thought is long

  # Bounded auto-tuning. Off by default. Per ADR-007, news-derived
  # recommendations NEVER auto-apply regardless of these bounds —
  # only metrics-driven (quant, risk) suggestions are eligible.
  auto_apply:
    enabled: false
    max_spacing_change_percentage: 20.0
    max_order_size_change_percentage: 15.0

# ============================================================================
# Per-CLI: harvest (cli/harvest — Stage 4.2 read-only treasury monitor)
# ============================================================================
# Cadence lives in `schedules.harvest` above. The daemon reads Kraken
# USD balance, runs the propose_transfer() decision, logs what WOULD
# be proposed, and (Stage 4.3) persists every non-None proposal to
# the harvest.db transfer_proposals table for operator review via
# `python tools/show_proposals.py`. Persistence happens regardless
# of `harvester.enabled` — that flag gates execution in Stage 4.4+,
# not the forensic record. No transfers happen through Stage 4.3.
harvest:
  db: "data/wobblebot-harvest.db"       # transfer_proposals lands here
  log_format: plain                     # plain | json

# ============================================================================
# Harvester (Phase 4 — Stage 4.1 schema landed; operational from 4.2+)
# ============================================================================
# Treasury-management thresholds. The Harvester proposes (and later
# executes, per ADR-003) Kraken↔bank transfers when balance leaves the
# operator-defined band. Per ADR-004 transfers go through Kraken's
# withdrawal API via ExchangePort — no separate banking adapter.
#
# Ordering invariant (validated at config-load):
#   min_exchange_liquidity_usd  <  topup_threshold_usd  <  surplus_threshold_usd
#
# - min_exchange_liquidity_usd: floor; Harvester never withdraws below.
# - topup_threshold_usd: low-water mark above the floor. Between min
#   and topup, Harvester proposes a bank→Kraken deposit.
# - surplus_threshold_usd: ceiling. Above this, Harvester proposes
#   scraping the excess to bank.
# - max_withdrawal_per_day_usd: rolling 24h cap on outflows. Limits
#   blast radius of a misconfiguration or runaway loop.
#
# `enabled: false` mirrors the auto-apply gate posture (ADR-012-style):
# operator opts in for any code path that moves money.
harvester:
  enabled: false
  min_exchange_liquidity_usd: 200.0
  topup_threshold_usd: 250.0
  surplus_threshold_usd: 500.0
  max_withdrawal_per_day_usd: 1000.0
  # Stage 4.4 fields (operational; safe to leave as defaults until execute lands).
  # Per ADR-003 the Harvester key has Withdraw + Query Funds scopes ONLY —
  # NOT Create/Modify/Cancel orders (that's the trade key's territory).
  api_key_env_var: KRAKEN_HARVESTER_API_KEY
  api_secret_env_var: KRAKEN_HARVESTER_API_SECRET
  # Asset → destination-label mapping. The label MUST already exist in
  # Kraken Pro → Funding → Withdraw → New Address (or New Wire Recipient).
  # Kraken's withdrawal API only accepts labels from the operator's
  # pre-registered address book — there's no API path for arbitrary
  # recipients, by design. The Stage 4.4c `cli/harvest --execute` path
  # refuses every withdrawal whose asset has no entry here.
  #
  # Operator: replace these placeholders with your real Kraken Pro
  # destination labels (or remove the asset entirely if you don't want
  # withdrawals enabled for it).
  withdrawal_destinations:
    USD: "<your-bank-label>"              # bank ACH/wire recipient label
    # BTC: "btc-coldstorage-1"            # crypto address label (uncomment as needed)
  # --execute refuses any proposal older than this; defends against
  # operator approving stale proposals where balance/threshold context
  # has drifted since the proposal was generated.
  proposal_max_age_hours: 24

# ============================================================================
# Profiles (named overrides)
# ============================================================================
# Operator runs `cli/live --profile conservative` (or `cli/shadow
# --profile conservative`, etc.) to deep-merge the named block over
# the base config. CLI flags override even profiles. Apply only the
# keys you want to change; everything else inherits.
#
# Each profile covers EVERY mode the profile is meaningful for. The
# read-only/diagnostic CLIs (observe, status, sandbox, preflight)
# don't have risk knobs to tune by profile, so they don't appear
# here — they always run with their base config + flag overrides.
profiles:

  # Conservative: wide spacing, fewer orders, tight kill switches.
  # Also caps shadow's max session loss + shrinks the synthetic
  # starting balance so even simulated runs stay frugal-feeling.
  conservative:
    grid:
      default:
        spacing_percentage: 2.0
        levels_above: 2
        levels_below: 2
    safety:
      max_total_exposure_usd: 50.0
      max_daily_spend_usd: 30.0
    live:
      max_session_loss_usd: 2.0
      max_runtime_minutes: 30.0
    shadow:
      max_session_loss_usd: 50.0
      initial_balances:
        USD: 1000

  # Aggressive: tight spacing, more orders, looser caps. Shadow
  # gets a bigger synthetic pot so multi-cycle behavior has room
  # to play out before hitting balance constraints.
  aggressive:
    grid:
      default:
        spacing_percentage: 0.5
        levels_above: 5
        levels_below: 5
        order_size_usd: 20.0
    safety:
      max_total_exposure_usd: 500.0
      max_daily_spend_usd: 200.0
    live:
      max_session_loss_usd: 10.0
      max_runtime_minutes: 120.0
    shadow:
      max_session_loss_usd: 200.0
      initial_balances:
        USD: 50000
        BTC: 1
        ETH: 5

  # Mixture-of-experts advisor (Stage 3.4a).
  #
  # As of Stage 3.4a only the Ollama provider is wired up — cloud
  # adapters (anthropic / openai / google) raise at advisor-construction
  # time. The default `moe-advisor` profile below is therefore an
  # all-Ollama lineup that runs as-shipped. The `cloud-mix` and
  # `cloud-only-moe` profiles further down show the shape that will
  # work once those adapters land in a later stage.
  #
  # Adjust the model tags to match what `ollama list` shows on your
  # machine. The aggregator choices are `voting` (per-key majority),
  # `weighted_confidence` (weighted by each expert's self-reported
  # confidence), or `arbitrator` (a fourth model reads the three
  # opinions and picks the final call — the arbitrator block must
  # be set when aggregator=arbitrator).
  moe-advisor:
    advisor:
      type: moe
      aggregator: arbitrator

      arbitrator:
        provider: ollama
        model: phi4:14b-q8_0
        prompt_file: "config/prompts/arbitrator.md"
        inference_params:
          temperature: 0.3
          max_tokens: 1024
          timeout_seconds: 180

      experts:
        - name: quant
          provider: ollama
          model: phi4:14b-q8_0
          role: quant
          prompt_file: "config/prompts/quant.md"
          inference_params:
            temperature: 0.5
            max_tokens: 512
            timeout_seconds: 120
        - name: risk
          provider: ollama
          model: qwen3:8b
          role: risk
          prompt_file: "config/prompts/risk.md"
          inference_params:
            temperature: 0.4
            max_tokens: 512
            timeout_seconds: 120
        - name: news
          provider: ollama
          model: deepseek-r1:8b
          role: news
          prompt_file: "config/prompts/news.md"
          inference_params:
            temperature: 0.6
            max_tokens: 2048               # R1 needs room for <think> + JSON
            timeout_seconds: 180

  # Cloud-only MoE: every expert is a cloud LLM. Will land once the
  # AnthropicAdapter / OpenAIAdapter / GoogleAdapter ship — currently
  # raises at advisor-construction time with "provider not implemented".
  cloud-only-moe:
    advisor:
      type: moe
      aggregator: arbitrator

      arbitrator:
        provider: anthropic
        model: claude-sonnet-4-6
        prompt_file: "config/prompts/arbitrator.md"
        inference_params:
          temperature: 0.3
          max_tokens: 1024

      experts:
        - name: claude
          provider: anthropic
          model: claude-sonnet-4-6
          role: quant
          prompt_file: "config/prompts/quant.md"
          inference_params:
            temperature: 0.5
            max_tokens: 512
        - name: gpt
          provider: openai
          model: gpt-4o
          role: risk
          prompt_file: "config/prompts/risk.md"
          inference_params:
            temperature: 0.4
            max_tokens: 512
        - name: gemini
          provider: google
          model: gemini-2.0-flash
          role: news
          prompt_file: "config/prompts/news.md"
          inference_params:
            temperature: 0.6
            max_tokens: 512
