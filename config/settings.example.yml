# WobbleBot Configuration (Example)
#
# Copy this file to settings.yml and adjust for your needs. The
# committed example file documents every operator-tunable value;
# settings.yml stays gitignored and holds your actual values.
#
# Per the project's standing rule, settings.example.yml and
# settings.yml stay schema-aligned: same keys, same comments, same
# section ordering, same structure — only VALUES differ. Schema-drift
# tests (tests/config/test_schema_drift.py) catch most drift, but
# comment parity is on you.
#
# CLIs accept --config path/to/settings.yml (default: this directory's
# settings.yml) and --profile NAME to apply a named override block.
# Any CLI flag passed explicitly takes precedence over both YAML and
# profile values.

# ============================================================================
# Application metadata
# ============================================================================
application:
  name: "WobbleBot"
  version: "0.1.0"
  # mode: sandbox | dev | live-low-risk | production
  # Currently informational only; Phase 5 may use it to gate features.
  mode: "sandbox"

# ============================================================================
# Exchange connection (Kraken)
# ============================================================================
# API credentials NEVER live here — they're in .env as KRAKEN_API_KEY
# (read-only) and KRAKEN_TRADE_API_KEY (Trade scope, no Withdraw).
# This block holds connection-level tunables only.
exchange:
  name: "kraken"
  rate_limit_rps: 1.0       # request budget per second; Kraken's tier limit is generous for hobby use
  request_timeout_seconds: 10
  max_retries: 3
  retry_delay_seconds: 2.0

# ============================================================================
# Grid trading geometry (engine-tunable)
# ============================================================================
# These are the parameters the GridEngine reads. Per-coin overrides
# under `coins:` shadow `default:` for that coin only.
grid:
  default:
    spacing_percentage: 1.0   # delta between adjacent levels, % of reference price
    levels_above: 3           # SELL levels above the anchor
    levels_below: 3           # BUY levels below the anchor
    order_size_usd: 10.0      # USD budget per order; per-pair quantization happens at submit

  coins:
    DOGE:
      spacing_percentage: 2.0
      levels_above: 3
      levels_below: 3
      order_size_usd: 15.0
      enabled: true
    ADA:
      spacing_percentage: 1.5
      levels_above: 4
      levels_below: 4
      order_size_usd: 12.0
      enabled: false
    SOL:
      spacing_percentage: 1.0
      levels_above: 5
      levels_below: 5
      order_size_usd: 10.0
      enabled: false
    MATIC:
      spacing_percentage: 1.5
      levels_above: 4
      levels_below: 4
      order_size_usd: 10.0
      enabled: false
    ETH:
      # spacing_percentage must exceed 0.52% (= 2 × Kraken's 0.26% maker
      # fee) for cycles to be profitable. Soak finding 2026-05-20: the
      # prior default of 0.5% was below that threshold and would lose
      # money on every completed cycle. 1.0% leaves a comfortable margin.
      spacing_percentage: 1.0
      levels_above: 6
      levels_below: 6
      order_size_usd: 20.0
      enabled: false

# ============================================================================
# Safety caps (engine-enforced, non-negotiable)
# ============================================================================
# These are checked inside GridEngine BEFORE any place_order call.
# Refusals are logged + counted in StepResult.refusals; they never raise.
safety:
  max_total_exposure_usd: 100.0       # global cap across all coins
  max_daily_spend_usd: 100.0          # BUY-side commits per UTC day
  max_per_coin_exposure_usd: 100.0    # per-coin cap
  max_orders_per_coin: 20             # count cap, per-coin

  emergency_stop:
    enabled: true
    max_loss_percentage: 20.0         # informational; not yet wired
    min_exchange_balance_usd: 0       # informational; not yet wired

# ============================================================================
# Scheduled task cadences (Stage 3.3 Slice C.0)
# ============================================================================
# Every long-running daemon reads its polling interval from here.
# Duration format: a number with a unit suffix.
#   30s   = 30 seconds
#   10m   = 10 minutes
#   4h    = 4 hours
#   7d    = 7 days
# A bare number is treated as seconds (e.g. `30` == `30s`). Use `0s`
# to disable a schedule whose consumer supports it (only observe's
# balance polling does today).
#
# Adding a new periodic task: add a key here and have the consuming
# CLI look it up via config.schedules.get("<name>").
schedules:
  observe_prices: 30s                 # cli/observe: public Ticker poll cadence
  observe_balances: 10m               # cli/observe: private BalanceEx; 0s disables
  news: 30m                           # cli/news: poll every enabled source
  advise: 4h                          # cli/advise (Stage 3.3): advisor invocation cadence
  harvest: 1h                         # cli/harvest (Stage 4.2): balance-monitor cadence
  maintenance_vacuum: 7d              # cli/maintenance (Stage 8.2): VACUUM cadence
  maintenance_prune: 1d               # cli/maintenance: price_snapshots prune+archive cadence
  maintenance_backup: 1d              # cli/maintenance: SQLite .backup cadence

# ============================================================================
# Per-CLI: live (cli/live)
# ============================================================================
# Knobs specific to the operational loop against real Kraken.
# Real money trading. CLI flags override these values.
live:
  symbols:
    - BTC/USD
  db: "data/wobblebot-live.db"
  tick_seconds: 5.0
  max_runtime_minutes: 60.0           # session-level kill switch; ~null~ = run indefinitely
  max_session_loss_usd: 5.0           # mark-to-market portfolio drop (USD) that aborts the session
  log_format: plain                   # plain | json
  # Stage 5.4: wires cli/live to the operator interaction layer. With
  # this set, cli/live writes session/fill/cap notifications to the
  # notifications table AND polls pending_commands WHERE status='approved'
  # (the ADR-002 firewall). Set to null to run Discord-ignorant.
  operator_db: "data/wobblebot-operator.db"

# ============================================================================
# Per-CLI: shadow (cli/shadow)
# ============================================================================
# Same engine, real Kraken prices, simulated execution against a
# synthetic ledger. No real money.
shadow:
  symbols:
    - BTC/USD
  db: "data/wobblebot-shadow.db"
  tick_seconds: 5.0
  max_runtime_minutes: 60.0           # session-level kill switch; ~null~ = run indefinitely
  max_session_loss_usd: 100.0         # synthetic — be generous
  log_format: plain

  # Synthetic balances at session start. Operator-supplied; never
  # inferred from real Kraken (per ADR-008's muscle-memory guard).
  initial_balances:
    USD: 10000
    BTC: 0
    ETH: 0

  # Per-fill fee model. Default rates match Kraken's published
  # base-tier (0.26% maker / 0.40% taker), confirmed by the live
  # measurement in Phase 2's first-trade receipt.
  maker_fee_rate: 0.0026
  taker_fee_rate: 0.0040

# ============================================================================
# Per-CLI: observe (cli/observe)
# ============================================================================
# Pure data collection; no engine, no LLM, no orders. Polling cadences
# live in the `schedules:` block at the bottom of this file.
observe:
  symbols:
    - BTC/USD
  db: "data/wobblebot-observe.db"
  log_format: plain

# ============================================================================
# Per-CLI: preflight (cli/preflight)
# ============================================================================
# Diagnostic single-step against live Kraken with adapter in
# validate=true mode. Reads grid + safety from the sections above.
preflight:
  symbol: BTC/USD                     # singular — preflight runs ONE step
  log_format: plain

# ============================================================================
# Per-CLI: status (cli/status)
# ============================================================================
# Read-only one-shot Kraken fetch: current price + account balances.
# No engine, no orders. Uses KRAKEN_API_KEY (read-only key).
status:
  symbol: BTC/USD
  log_format: plain

# ============================================================================
# Per-CLI: sandbox (cli/sandbox)
# ============================================================================
# Phase 1 sandbox: hard-coded buy-dip/sell-rebound cycle through
# MockExchangeAdapter + SQLiteStorageAdapter. No real Kraken contact.
# Useful for verifying the hex layers wire up after a fresh checkout.
sandbox:
  db: "data/wobblebot-sim.db"
  log_format: plain

# ============================================================================
# News ingestion (Stage 3.2.5 — see ADR-007)
# ============================================================================
# Long-running daemon (`python -m wobblebot.cli.news`) that polls every
# enabled source and persists items to news_items. Storage dedup is
# UNIQUE(source, external_id), so re-fetching across polls is a no-op.
#
# Two source types ship in v1:
#   - RSS feeds (no auth, any feed URL works)
#   - CryptoCompare News (free tier; requires CRYPTOCOMPARE_API_KEY)
#
# The original ADR-007 plan named CryptoPanic + Whale-alert; both went
# paid-only after the ADR was written, so v1 pivots to RSS +
# CryptoCompare. NewsPort stays abstract — operators can plug in paid
# sources later if they want.
#
# Per-source dedup means leaving overlapping feeds enabled is safe;
# the storage layer keeps one row per (source, external_id) pair.
# Disabling a noisy outlet is a single `enabled: false` flip.
news:
  db: "data/wobblebot-news.db"

  rss_feeds:
    - source_id: rss:coindesk
      url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
      enabled: true
    - source_id: rss:decrypt
      url: "https://decrypt.co/feed"
      enabled: true
    - source_id: rss:theblock
      url: "https://www.theblock.co/rss.xml"
      enabled: true
    - source_id: rss:cointelegraph
      url: "https://cointelegraph.com/rss"
      enabled: false                  # noisier; flip on if you want broader coverage

  # CryptoCompare News (aggregator; free tier requires API key).
  # Substantially overlaps with RSS coverage. Keep enabled for 90 days
  # then evaluate whether the additional source diversity earns its
  # place vs. simply running more RSS feeds.
  cryptocompare:
    enabled: true
    lang: EN
    # categories: "BTC|ETH"            # optional pipe-separated filter

  # Stage 8.4 follow-up: cross-source syndication dedup. Storage's
  # UNIQUE(source, external_id) catches same-source reposts; this
  # block catches the same wire story republished by multiple
  # outlets with reworded headlines. Token-set ratio (rapidfuzz) +
  # mentioned-coins overlap guard.
  dedup:
    # Hours of recent items each candidate is compared against.
    window_hours: 6.0
    # Token-set ratio threshold (0-100). Default 60 measured against
    # real syndicated rewording. Raise to 70 for stricter dedup,
    # lower to 55 for aggressive. Set to 0 to disable (storage-level
    # exact dedup still applies).
    fuzzy_threshold: 60.0

  log_format: plain

# ============================================================================
# Per-CLI: advise (cli/advise — Stage 3.3 Passive Advisory Workflow)
# ============================================================================
# Long-running daemon that periodically builds a PerformanceSummary,
# asks the configured advisor for a recommendation, and persists the
# result to its own DB. Per ADR-002 + ADR-007 nothing here applies —
# operator reviews via `tools/show_suggestions.py`.
#
# Cadence lives in `schedules.advise` above. Multi-symbol since
# Stage 3.6b: the daemon iterates serial per symbol within each sweep,
# building a single-symbol PerformanceSummary per cycle so the LLM
# never sees more than one coin's context at a time (no cross-
# contamination of opinions).
advise:
  symbols:
    - BTC/USD
    # - ETH/USD       # uncomment to add coverage; cycles run serial
    # - DOGE/USD
  db: "data/wobblebot-advise.db"
  observe_db: "data/wobblebot-observe.db"   # where to read price history
  news_db: "data/wobblebot-news.db"         # where to read news context
  metrics_lookback_hours: 6                 # window for vol/drawdown/flatness/cycles
  news_lookback_hours: 24                   # 0 disables news in the prompt
  news_match_coin: false                    # true = only news mentioning the symbol's base
  news_limit: 20                            # cap items per cycle (prompt-token budget)
  log_format: plain

# ============================================================================
# Strategy Advisor (Phase 3 — see ADR-007 + ADR-009)
# ============================================================================
# Two modes:
#   type: single  - one LLM, no aggregation. Simple; fast to iterate.
#                   This is the Stage 3.2 default; MoE ships in 3.4a.
#   type: moe     - mixture of experts (≥3 LLMs) + aggregator. The
#                   `profiles.moe-advisor` block below shows the full
#                   MoE shape; activate it with `--profile moe-advisor`
#                   once the MoE adapter lands.
#
# Aggregation strategies (MoE only):
#   voting              - discrete-direction votes; majority wins
#   weighted_confidence - numeric proposals × self-reported confidence
#   arbitrator          - a fourth model reads expert opinions, picks
#
# Cloud LLMs (Anthropic/OpenAI/Google) and local Ollama models can mix
# freely. Per ADR-007 the upside of genuinely different training priors
# outweighs per-call data exposure for a hobby trading bot.
advisor:
  type: single                        # Stage 3.2 default. Flip to `moe` via profile.

  # Cadence lives in the `schedules:` block at the bottom of this file
  # (key: `advise`), alongside every other periodic-task interval.

  # Single-mode LLM target. Required when type=single.
  provider: ollama                    # ollama | anthropic | openai | google
  model: deepseek-r1:7b
  prompt_file: "config/prompts/quant.md"
  inference_params:
    temperature: 0.5
    max_tokens: 512                   # bump to 2048 for thinking models (R1, o1) —
                                      # they need room for <think> + the JSON answer
    timeout_seconds: 60               # bump to 180+ for 70B-class models or any
                                      # thinking model whose chain-of-thought is long

  # Bounded auto-tuning. Off by default. Per ADR-007, news-derived
  # recommendations NEVER auto-apply regardless of these bounds —
  # only metrics-driven (quant, risk) suggestions are eligible.
  auto_apply:
    enabled: false
    max_spacing_change_percentage: 20.0
    max_order_size_change_percentage: 15.0

# ============================================================================
# Per-CLI: harvest (cli/harvest — Stage 4.2 read-only treasury monitor)
# ============================================================================
# Cadence lives in `schedules.harvest` above. The daemon reads Kraken
# USD balance, runs the propose_transfer() decision, logs what WOULD
# be proposed, and (Stage 4.3) persists every non-None proposal to
# the harvest.db transfer_proposals table for operator review via
# `python tools/show_proposals.py`. Persistence happens regardless
# of `harvester.enabled` — that flag gates execution in Stage 4.4+,
# not the forensic record. No transfers happen through Stage 4.3.
harvest:
  db: "data/wobblebot-harvest.db"       # transfer_proposals lands here
  log_format: plain                     # plain | json
  # Stage 5.5: wires cli/harvest to the notifications table so proposal
  # generated / withdrawal failed / withdrawal executed events surface
  # to Discord via cli/operator's forwarder. Set to null to run silent.
  operator_db: "data/wobblebot-operator.db"

# ============================================================================
# Harvester (Phase 4 — Stage 4.1 schema landed; operational from 4.2+)
# ============================================================================
# Treasury-management thresholds. The Harvester proposes (and later
# executes, per ADR-003) Kraken↔bank transfers when balance leaves the
# operator-defined band. Per ADR-004 transfers go through Kraken's
# withdrawal API via ExchangePort — no separate banking adapter.
#
# Ordering invariant (validated at config-load):
#   min_exchange_liquidity_usd  <  topup_threshold_usd  <  surplus_threshold_usd
#
# - min_exchange_liquidity_usd: floor; Harvester never withdraws below.
# - topup_threshold_usd: low-water mark above the floor. Between min
#   and topup, Harvester proposes a bank→Kraken deposit.
# - surplus_threshold_usd: ceiling. Above this, Harvester proposes
#   scraping the excess to bank.
# - max_withdrawal_per_day_usd: rolling 24h cap on outflows. Limits
#   blast radius of a misconfiguration or runaway loop.
#
# `enabled: false` mirrors the auto-apply gate posture (ADR-012-style):
# operator opts in for any code path that moves money.
harvester:
  enabled: false
  min_exchange_liquidity_usd: 200.0
  topup_threshold_usd: 250.0
  surplus_threshold_usd: 500.0
  max_withdrawal_per_day_usd: 1000.0
  # Stage 4.4 fields (operational; safe to leave as defaults until execute lands).
  # Per ADR-003 the Harvester key has Withdraw + Query Funds scopes ONLY —
  # NOT Create/Modify/Cancel orders (that's the trade key's territory).
  api_key_env_var: KRAKEN_HARVESTER_API_KEY
  api_secret_env_var: KRAKEN_HARVESTER_API_SECRET
  # Asset → destination-label mapping. The label MUST already exist in
  # Kraken Pro → Funding → Withdraw → New Address (or New Wire Recipient).
  # Kraken's withdrawal API only accepts labels from the operator's
  # pre-registered address book — there's no API path for arbitrary
  # recipients, by design. The Stage 4.4c `cli/harvest --execute` path
  # refuses every withdrawal whose asset has no entry here.
  #
  # Operator: replace these placeholders with your real Kraken Pro
  # destination labels (or remove the asset entirely if you don't want
  # withdrawals enabled for it).
  withdrawal_destinations:
    USD: "<your-bank-label>"              # bank ACH/wire recipient label
    # BTC: "btc-coldstorage-1"            # crypto address label (uncomment as needed)
  # --execute refuses any proposal older than this; defends against
  # operator approving stale proposals where balance/threshold context
  # has drifted since the proposal was generated.
  proposal_max_age_hours: 24

# ============================================================================
# Operator interaction daemon (Phase 5 — Stage 5.6+; cli/operator)
# ============================================================================
# Bidirectional Discord interface per ADR-013. cli/operator maintains a
# Gateway connection, parses operator messages via an LLM (Ollama in
# Phase 5; cloud variants in Phase 6) into typed OperatorIntent
# payloads, and routes:
#   - Command (pause/resume/cancel/stop) → writes a PendingCommand row,
#     posts a confirm embed; cli/live polls approved rows and dispatches
#     (the ADR-002 confirm-before-execute firewall).
#   - Query (status/open_orders/recent_fills/...) → answers immediately.
#   - Conversational → posts reply text.
#   - Unparseable → asks the operator to rephrase.
# A background forwarder also drains the `notifications` SQLite table
# (written by cli/live + cli/harvest) and posts each as a Discord
# embed; a TTL expirer transitions abandoned awaiting_confirmation
# rows to expired.
#
# Per ADR-013 decision 9 neither cli/live nor cli/harvest imports
# discord.py — they write notification rows; cli/operator forwards.
operator:
  auth:
    # Discord bot token env-var name. The actual token never appears in
    # this file — it lives in .env (gitignored). Leave the env-var name
    # if the default works; override only if you maintain multiple bots
    # in the same .env.
    bot_token_env_var: DISCORD_BOT_TOKEN
    # Whitelist of Discord user IDs allowed to send the bot commands +
    # confirm pending actions. Empty = deny everyone (no one can use the
    # bot). Find a user's ID by right-clicking their name with Discord
    # developer mode enabled.
    allowed_user_ids: []
    # Whitelist of Discord channel IDs the bot listens in. Empty = deny
    # all channels. Find a channel's ID by right-clicking the channel
    # with developer mode enabled.
    allowed_channel_ids: []
    # Where outbound notifications + confirmation embeds post. MUST be
    # in allowed_channel_ids — the daemon validates at startup.
    outbound_channel_id: "<your-discord-channel-id>"
  assistant:
    # LLM provider for intent parsing. Phase 5 ships ollama only;
    # Phase 6 will add anthropic / openai / google.
    provider: ollama
    # Ollama model tag. phi4:14b-q8_0 is the operator's empirical
    # default for conversational intent parsing (decent accuracy on
    # the operator_intent_v1 schema; ~2-4s latency on a hobby box).
    model: phi4:14b-q8_0
    # Path to the operator prompt file. Ships at config/prompts/operator.md;
    # operators edit freely — the only mechanical contract is the
    # frontmatter declaring `role: operator` and
    # `response_schema: operator_intent_v1`.
    prompt_file: config/prompts/operator.md
    base_url: http://localhost:11434
    # Lower temperature than the advisor's 0.5 — intent parsing
    # benefits from determinism. Bump if responses get too rigid.
    temperature: 0.3
    max_tokens: 512
    timeout_seconds: 60.0
  # Path to the daemon's own SQLite DB. Houses three tables:
  # pending_commands (Stage 5.4), notifications (Stage 5.5), and
  # conversation_turns (Stage 5.6).
  operator_db: "data/wobblebot-operator.db"
  # Optional paths to other CLIs' DBs. When set, cli/operator can
  # answer queries that need data from those scopes (recent advisor
  # suggestions, recent news headlines, harvester status / recent
  # proposals). When unset, those queries return empty results —
  # graceful degrade.
  live_db: "data/wobblebot-live.db"
  advise_db: "data/wobblebot-advise.db"
  news_db: "data/wobblebot-news.db"
  harvest_db: "data/wobblebot-harvest.db"
  # ADR-013 decision 5: 10-turn multi-turn context window. Capped at
  # 1-50 by the schema. Higher values give the LLM more history but
  # cost more tokens per call.
  context_window_turns: 10
  # ADR-013 decision 3: confirmation TTL. After this many seconds
  # without an operator confirm/reject reaction, an
  # awaiting_confirmation row transitions to 'expired' via the
  # daemon's background TTL expirer.
  confirm_ttl_seconds: 300
  # Notification forwarder poll cadence. Lower = faster Discord
  # surfacing; higher = less CPU + DB load.
  forwarder_poll_seconds: 2.0
  # TTL expirer poll cadence. Doesn't need to be fast — the operator's
  # expectation is "wait a minute, maybe two".
  ttl_expirer_poll_seconds: 30.0
  log_format: plain                       # plain | json

# ============================================================================
# Cloud LLM cost caps + retry policy (Phase 6 — ADR-014 + ADR-015)
# ============================================================================
# Cross-cutting block applied to every cloud-LLM call regardless of
# which CLI (cli/advise, cli/operator, ...) or role drove it. Ollama
# (local, free) calls bypass — only the three cloud providers
# (anthropic, openai, google) are gated.
#
# Leave the block omitted entirely (or set to null) for a pure-Ollama
# deployment — the gate is inactive and zero config is needed. The
# presence of `llm:` is the opt-in signal that cloud usage is in
# scope.
#
# Per ADR-014 decision 8, set `cost.enforce: false` for the first
# week of cloud usage so the gate records every call (forensic
# audit trail in operator.db's llm_calls table) but never denies.
# Flip to true once you've seen real cost numbers and confirmed the
# caps fit your usage.
llm:
  cost:
    # Sliding 24-hour USD cap across all roles + providers. Trips
    # raise LLMCostCapExceeded; the calling CLI catches and skips
    # the call (cli/advise) or posts an operator notification
    # (cli/operator).
    max_spend_per_day_usd: "1.00"
    # Per-CLI-invocation USD cap. In-memory tally, resets per
    # process start. Catches runaway loops that the daily cap
    # wouldn't notice fast enough.
    max_spend_per_session_usd: "0.50"
    # Dry-run kill switch. true = gate enforces; false = gate
    # records calls but never denies (ADR-014 decision 8 — see
    # block-level comment above).
    enforce: true
  retry:
    # Total cloud-LLM call attempts = 1 + max_retries. Transient
    # errors (429 / 5xx / network) retry; permanent (other 4xx)
    # raise immediately. ADR-015 default policy.
    max_retries: 3
    # First retry waits this long; subsequent retries multiply.
    # Defaults give 1s / 2s / 4s for max_retries=3 — total ~7s
    # worst-case retry window.
    initial_backoff_seconds: 1.0
    backoff_multiplier: 2.0

# ============================================================================
# Web UI (Phase 7 — Stage 7.1+, required for cli/web)
# ============================================================================
# Server-rendered FastAPI + Jinja2 dashboard with HTMX-polled cards.
# Operator-managed reverse proxy fronts this on the LAN (ADR-016);
# bind_host defaults to 127.0.0.1 so the daemon is loopback-only out
# of the box. Auth is single-operator-v1: session cookie + bcrypt
# password seeded via `cli/web create-user`. CSRF synchronizer-token
# middleware + per-IP login rate-limit defend the auth surface
# (ADR-017).
#
# Leave the block omitted entirely (or set to null) when not running
# the web UI — the dashboard is opt-in. The required env var
# `WOBBLEBOT_WEB_SESSION_SECRET` only matters when `cli/web serve`
# starts up (mint via `python -c "import secrets;
# print(secrets.token_urlsafe(32))"`).
web:
  # ---- serving ----
  # 127.0.0.1 = loopback-only. Operator runs their reverse proxy in
  # front for TLS + LAN exposure. Set 0.0.0.0 only if the host is
  # already firewalled and TLS is terminated elsewhere.
  bind_host: 127.0.0.1
  bind_port: 8000
  # ---- session / auth (ADR-017) ----
  # Env var holding the cookie-signing key. Never the key itself —
  # the key lives in .env (gitignored).
  session_secret_env_var: WOBBLEBOT_WEB_SESSION_SECRET
  # Sliding session lifetime. Cookie expires after this many days of
  # inactivity. 1-90 enforced by the schema.
  session_max_age_days: 7
  # Per-IP login attempts allowed in `rate_limit_window_seconds`
  # before further attempts return 429. 1-100 enforced.
  rate_limit_attempts: 5
  rate_limit_window_seconds: 60
  # Bcrypt cost factor for new password hashes. 12 is the ADR-017
  # default. Bump to 13 / 14 if the operator's hardware warrants;
  # 10-15 enforced.
  bcrypt_cost: 12
  # ---- presentation ----
  # HTMX polling cadence for the cost ledger + open-orders cards.
  # Static-ish pages (news, audit log) ignore this — they're
  # full-reload-on-navigation.
  htmx_poll_seconds: 15.0
  # External Kraken account URL surfaced as a header link for
  # one-click access. Default lands on Kraken Pro's trade page;
  # operators in non-US regions may override. Set to null to
  # suppress the link entirely.
  kraken_account_url: "https://pro.kraken.com/app/trade"
  # ---- cross-DB paths ----
  # operator.db is REQUIRED (users table + pending_commands +
  # notifications + llm_calls). The other four are optional per the
  # OperatorService graceful-degrade pattern (Stage 5.6.C) — cards
  # that need the missing DB don't render.
  operator_db: "data/wobblebot-operator.db"
  live_db: "data/wobblebot-live.db"
  advise_db: "data/wobblebot-advise.db"
  harvest_db: "data/wobblebot-harvest.db"
  observe_db: "data/wobblebot-observe.db"
  news_db: "data/wobblebot-news.db"
  log_format: plain                       # plain | json

# ============================================================================
# Maintenance worker (Phase 8 — Stage 8.2+, required for cli/maintenance)
# ============================================================================
# Long-running daemon with three concurrent scheduled tasks:
# vacuum / prune+archive / backup. Operator-started; not auto-spawned
# by any other daemon. Cadences pulled from `schedules:` block above
# (maintenance_vacuum / maintenance_prune / maintenance_backup) with
# per-task defaults (7d / 1d / 1d) when missing.
#
# Per stage-8.2-design.md decision 3 only `price_snapshots` gets
# pruned in v1.0. Every audit table (orders, trades, llm_calls, etc.)
# stays forever; archive is the operator's manual concern there.
#
# Per decision 4 only local backups ship in v1.0. SQLite's online
# `.backup` API produces atomic point-in-time copies without
# locking cli/live's writers. Operator can rclone/rsync the
# backup_dir to offsite storage if they want.
maintenance:
  # Every DB the daemon should VACUUM + back up. Add the operator's
  # active DBs; missing files are skipped (logged WARNING) so partial
  # deployments work.
  target_dbs:
    - "data/wobblebot-live.db"
    - "data/wobblebot-shadow.db"
    - "data/wobblebot-operator.db"
    - "data/wobblebot-observe.db"
    - "data/wobblebot-advise.db"
    - "data/wobblebot-harvest.db"
    - "data/wobblebot-news.db"

  # Snapshots older than this many days get archived + deleted.
  # Default 30 matches the typical advisor-metrics rolling window.
  prune_price_snapshots_older_than_days: 30

  # Source DB for the prune task. Typically observe.db (where
  # cli/observe writes the price tape). The maintenance daemon
  # won't infer this — set it explicitly.
  prune_source_db: "data/wobblebot-observe.db"

  # Where pruned snapshots are archived BEFORE delete. Created if
  # missing. CSV format with stable header.
  archive_dir: "data/archive"

  # Where SQLite .backup output goes. Created if missing.
  backup_dir: "data/backups"

  # Newest N backups per source DB are kept; older ones are deleted
  # after each successful backup write.
  keep_n_daily_backups: 7

  log_format: plain                       # plain | json

  # Optional rotating-file log destination. When set, the daemon
  # also writes to this file with daily rotation (7 day retention).
  # Leave commented to keep stdout-only behavior.
  # log_file_path: "data/logs/maintenance.log"

  # Stage 8.4.E follow-up — when set, cli/maintenance opens operator.db
  # and writes a daemon_heartbeat row at the top of each scheduled
  # task so the web UI's /health page can see the daemon is alive.
  # Without this, /health shows cli/maintenance as UNKNOWN.
  operator_db: "data/wobblebot-operator.db"

# ============================================================================
# Profiles (named overrides)
# ============================================================================
# Operator runs `cli/live --profile conservative` (or `cli/shadow
# --profile conservative`, etc.) to deep-merge the named block over
# the base config. CLI flags override even profiles. Apply only the
# keys you want to change; everything else inherits.
#
# Each profile covers EVERY mode the profile is meaningful for. The
# read-only/diagnostic CLIs (observe, status, sandbox, preflight)
# don't have risk knobs to tune by profile, so they don't appear
# here — they always run with their base config + flag overrides.
profiles:

  # Conservative: wide spacing, fewer orders, tight kill switches.
  # Also caps shadow's max session loss + shrinks the synthetic
  # starting balance so even simulated runs stay frugal-feeling.
  conservative:
    grid:
      default:
        spacing_percentage: 2.0
        levels_above: 2
        levels_below: 2
    safety:
      max_total_exposure_usd: 50.0
      max_daily_spend_usd: 30.0
    live:
      max_session_loss_usd: 2.0
      max_runtime_minutes: 30.0
    shadow:
      max_session_loss_usd: 50.0
      initial_balances:
        USD: 1000

  # Aggressive: tight spacing, more orders, looser caps. Shadow
  # gets a bigger synthetic pot so multi-cycle behavior has room
  # to play out before hitting balance constraints.
  aggressive:
    grid:
      default:
        spacing_percentage: 0.5
        levels_above: 5
        levels_below: 5
        order_size_usd: 20.0
    safety:
      max_total_exposure_usd: 500.0
      max_daily_spend_usd: 200.0
    live:
      max_session_loss_usd: 10.0
      max_runtime_minutes: 120.0
    shadow:
      max_session_loss_usd: 200.0
      initial_balances:
        USD: 50000
        BTC: 1
        ETH: 5

  # Mixture-of-experts advisor (Stage 3.4a).
  #
  # As of Stage 3.4a only the Ollama provider is wired up — cloud
  # adapters (anthropic / openai / google) raise at advisor-construction
  # time. The default `moe-advisor` profile below is therefore an
  # all-Ollama lineup that runs as-shipped. The `cloud-mix` and
  # `cloud-only-moe` profiles further down show the shape that will
  # work once those adapters land in a later stage.
  #
  # Adjust the model tags to match what `ollama list` shows on your
  # machine. The aggregator choices are `voting` (per-key majority),
  # `weighted_confidence` (weighted by each expert's self-reported
  # confidence), or `arbitrator` (a fourth model reads the three
  # opinions and picks the final call — the arbitrator block must
  # be set when aggregator=arbitrator).
  moe-advisor:
    advisor:
      type: moe
      aggregator: arbitrator

      arbitrator:
        provider: ollama
        model: phi4:14b-q8_0
        prompt_file: "config/prompts/arbitrator.md"
        inference_params:
          temperature: 0.3
          max_tokens: 1024
          timeout_seconds: 180

      experts:
        - name: quant
          provider: ollama
          model: phi4:14b-q8_0
          role: quant
          prompt_file: "config/prompts/quant.md"
          inference_params:
            temperature: 0.5
            max_tokens: 512
            timeout_seconds: 120
        - name: risk
          provider: ollama
          model: qwen3:8b
          role: risk
          prompt_file: "config/prompts/risk.md"
          inference_params:
            temperature: 0.4
            max_tokens: 512
            timeout_seconds: 120
        - name: news
          provider: ollama
          model: deepseek-r1:8b
          role: news
          prompt_file: "config/prompts/news.md"
          inference_params:
            temperature: 0.6
            max_tokens: 2048               # R1 needs room for <think> + JSON
            timeout_seconds: 180

  # Cloud-only MoE: every expert is a cloud LLM. Will land once the
  # AnthropicAdapter / OpenAIAdapter / GoogleAdapter ship — currently
  # raises at advisor-construction time with "provider not implemented".
  cloud-only-moe:
    advisor:
      type: moe
      aggregator: arbitrator

      arbitrator:
        provider: anthropic
        model: claude-sonnet-4-6
        prompt_file: "config/prompts/arbitrator.md"
        inference_params:
          temperature: 0.3
          max_tokens: 1024

      experts:
        - name: claude
          provider: anthropic
          model: claude-sonnet-4-6
          role: quant
          prompt_file: "config/prompts/quant.md"
          inference_params:
            temperature: 0.5
            max_tokens: 512
        - name: gpt
          provider: openai
          model: gpt-4o
          role: risk
          prompt_file: "config/prompts/risk.md"
          inference_params:
            temperature: 0.4
            max_tokens: 512
        - name: gemini
          provider: google
          model: gemini-2.0-flash
          role: news
          prompt_file: "config/prompts/news.md"
          inference_params:
            temperature: 0.6
            max_tokens: 512
