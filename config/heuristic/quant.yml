# Heuristic advisor spec — the deterministic half of the Stage 8.5
# heuristic+LLM cascade. Referenced from settings.yml via
# `advisor.heuristic_file`. Committed default; edit freely (operators
# own this file the same way they own config/prompts/*.md). A daemon
# restart picks up changes — cli/advise reads this once at startup.
#
# WHAT THIS CONTROLS: the four override guards the deterministic advisor
# uses to make the CLEAR calls (directional runaway, defensive drawdown,
# don't-fix-working, fee-floor calm) WITHOUT calling an LLM. In
# `engine: cascade`, every tick where no guard fires escalates to the
# LLM, which judges the regime freely (ADR-022) — the heuristic no longer
# tunes spacing toward the curve.
#
# The guard ALGORITHM and priority order live in code
# (adapters/heuristic_advisor.py); this file only tunes the numbers.
# Adding a brand-new guard is a code change with a fixture-battery test.

# ---------------------------------------------------------------------------
# Ideal grid spacing (%) vs realized per-tick volatility. Read ONLY by
# the defensive_drawdown guard, to set a vol-aware floor under its widen
# target (never below current * widen_factor). It no longer drives any
# first-order spacing decision — that logic was retired in ADR-022, since
# the 2.70% ceiling sat below the deployed grid and mechanically pushed
# TIGHTEN. Linear interpolation between points; flat-clamped at the ends.
# ---------------------------------------------------------------------------
curve:
  - {vol: 0.0008, spacing: 0.65}   # dead quiet
  - {vol: 0.002,  spacing: 0.90}   # calm
  - {vol: 0.003,  spacing: 1.05}   # calm+
  - {vol: 0.004,  spacing: 1.25}   # moderate
  - {vol: 0.006,  spacing: 1.60}   # moderate+
  - {vol: 0.008,  spacing: 1.90}   # active
  - {vol: 0.012,  spacing: 2.50}   # whipsaw
  - {vol: 0.014,  spacing: 2.70}   # extreme whipsaw

# Never recommend spacing below 2x the 0.26% maker fee — a tighter grid
# can't clear fees on a round-trip. Clamps the drawdown guard's floor.
fee_floor: 0.52

# ---------------------------------------------------------------------------
# Override guards — the heuristic's only opinions. Checked in priority
# order: directional_runaway -> defensive_drawdown -> dont_fix_working
# -> fee_floor_calm. The first that fires wins; if none fire the tick
# escalates to the LLM free judge. Set `enabled: false` on any guard to
# drop it from the chain (its cases then escalate too).
# ---------------------------------------------------------------------------
guards:
  # Price ran away (0 completed cycles) with a drawdown at least this
  # deep -> HOLD (re-anchoring is the fix, not a spacing change).
  directional_runaway:
    enabled: true
    threshold: -0.05

  # Sharp drawdown (this deep) while still cycling -> WIDEN for capital
  # preservation, target = current * widen_factor (never below the
  # vol-ideal). Overrides a calm-market tighten instinct.
  defensive_drawdown:
    enabled: true
    threshold: -0.05
    widen_factor: 1.5

  # Demonstrably working (win AND cycles high, drawdown shallow) ->
  # HOLD even if vol/spacing look mismatched. Don't disrupt fills.
  #
  # DORMANT AT WIDE (~3%) SPACING — left enabled on purpose (Stage 8.6,
  # Slice B). A 3% grid completes only ~0.2-0.4 round-trips/day (measured
  # on 2013-2025 BTC), so cycles_min: 8 is unreachable in any lookback
  # short enough for the volatility estimate to stay current. Widening the
  # window to chase it would make the -5% drawdown guards fire on ordinary
  # daily noise (a 24h window dips >=5% ~13% of the time vs ~2% at 6h), so
  # we deliberately keep metrics_lookback_hours at 6h. At wide spacing the
  # anti-churn job this guard was built for is done instead by escalating
  # the tick to the LLM free judge. Kept enabled (not deleted) because the MoE world
  # will propose fast/tight grids every ~4h and may run several at once; a
  # grid tight enough to clear 8 cycles in the window re-arms this guard
  # automatically — no code change needed.
  dont_fix_working:
    enabled: true
    win_rate_min: 0.85
    cycles_min: 8
    drawdown_max: -0.02

  # Spacing already near the fee floor in a dead-calm market -> HOLD
  # (can't profitably tighten further; a tiny widen just churns).
  fee_floor_calm:
    enabled: true
    calm_vol: 0.001
    near_floor_spacing: 0.68
