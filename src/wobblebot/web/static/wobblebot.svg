<?xml version="1.0" encoding="UTF-8"?>
<!--
  WobbleBot brand mark — wordmark + integrated bot + BOT subscript.

  Composition (hand-vectorized 2026-05-20 from approved candidate
  #17 of the brand iteration; openart.ai / Qwen Image Edit output):

  1. Lowercase "wobble" wordmark, friendly geometric sans, primary
     cyan (#4dd0e1).
  2. An S-curve enters from the lower-left, sweeps under the
     wordmark, rises through the right side, and terminates at a
     cyan ball above the bot. Single design move, two readings —
     the wobble waveform AND the visual connector to the bot.
  3. Egg-shaped weeble bot at upper right, line-art style, tilted
     ~8° to suggest mid-wobble. Closed crescent eyes and subtle
     smile carved directly into the silhouette (no separate face
     panel).
  4. "BOT" subscript centered below the wordmark in translucent
     cyan (fill-opacity 0.55) — subordinate to "wobble" but clearly
     present so the full product name "wobblebot" is unambiguous.

  Background is transparent — the host element's color shows
  through. Designed for the dark navbar (#1c1e21) where the cyan
  pops; also readable against the light page background (#f5f6f7).

  Wordmark uses a system-font stack with Inter preferred. For
  pixel-perfect rendering across systems, a future iteration can
  convert the text to outlined paths; live text is fine for v1.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110">
  <!-- 'wobble' wordmark -->
  <text x="155" y="72"
        font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="58" font-weight="700"
        text-anchor="middle" fill="#4dd0e1"
        letter-spacing="-2">wobble</text>

  <!-- 'BOT' subscript — translucent cyan reads as subordinate -->
  <text x="155" y="92"
        font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600"
        text-anchor="middle" fill="#4dd0e1" fill-opacity="0.55"
        letter-spacing="6">BOT</text>

  <!-- S-curve: wobble waveform that rises to the antenna ball -->
  <path d="M 30 88
           Q 80 105 155 96
           Q 230 87 263 50
           Q 285 26 295 14"
        fill="none" stroke="#4dd0e1"
        stroke-width="2.5" stroke-linecap="round"/>

  <!-- Antenna ball — curve terminus, atop bot's head -->
  <circle cx="295" cy="14" r="3.5" fill="#4dd0e1"/>

  <!-- Antenna stem connecting ball to bot's head -->
  <line x1="295" y1="18" x2="287" y2="32"
        stroke="#4dd0e1" stroke-width="2" stroke-linecap="round"/>

  <!-- Egg-shaped bot, tilted ~8° to suggest mid-wobble -->
  <g transform="rotate(-8 282 52)">
    <ellipse cx="282" cy="52" rx="14" ry="17"
             fill="none" stroke="#4dd0e1" stroke-width="2"/>

    <!-- Closed crescent eyes -->
    <path d="M 274 48 Q 277 45 280 48"
          fill="none" stroke="#4dd0e1"
          stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 284 48 Q 287 45 290 48"
          fill="none" stroke="#4dd0e1"
          stroke-width="1.5" stroke-linecap="round"/>

    <!-- Subtle smile -->
    <path d="M 278 56 Q 282 60 286 56"
          fill="none" stroke="#4dd0e1"
          stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
