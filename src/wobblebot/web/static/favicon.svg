<?xml version="1.0" encoding="UTF-8"?>
<!--
  WobbleBot favicon SVG — vector version of the ChatGPT cell #13
  design (bold W + antenna sweep + wobble curve on a dark squircle).

  Composition notes:
  - W is shifted slightly LEFT of squircle center so the antenna
    + sweep mass on the right visually balances it. Pixel-centered
    W would leave the antenna feeling cramped against the right
    edge of the squircle.
  - Stroke-based W (5-point path through outer + inner peaks +
    valleys) instead of an outlined filled letterform — fewer
    vertices, cleaner at small sizes, matches the icon-mark feel
    of the ChatGPT design.
  - All stroke linecaps + linejoins are "round" for friendly
    rendering at both small and large sizes.

  Same brand cyan (#29D9E3) as the hex SVG; squircle bg
  (#0b1530) matches the deeper navy of the contact sheet cell.
-->
<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="WobbleBot">

  <!-- Squircle background -->
  <rect x="40" y="40" width="432" height="432"
        rx="76" ry="76"
        fill="#0b1530"/>

  <g stroke="#29D9E3"
     fill="none"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- Wobble curve underneath the W — moved closer to the W
         baseline so the composition reads as W+curve, not
         W-floating-above-curve -->
    <path d="M 80 380 Q 240 440 380 360"
          stroke-width="22"/>

    <!-- W: 5-point path. V valleys shortened (y=345 not 370) so
         the joints are less acute and look softer. Center peak
         raised to y=190 (closer to outer points y=170) so the
         W reads more typographic, less chevron. -->
    <path d="M 90 170 L 178 345 L 222 190 L 268 345 L 355 170"
          stroke-width="52"/>

    <!-- Antenna arc — sweeps from the outer top corner of the
         right stroke up and to the right, ending at the dot -->
    <path d="M 360 175 C 420 138 450 110 410 86"
          stroke-width="22"/>
  </g>

  <!-- Antenna dot -->
  <circle cx="410" cy="86" r="20" fill="#29D9E3"/>
</svg>
